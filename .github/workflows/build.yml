name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create ZIP of dist folder
        run: zip -r build.zip ./dist

      - name: Save ZIP as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kbbillingapp-build
          path: build.zip
          retention-days: 30