name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create ZIP
        run: zip -r build.zip ./dist

      - name: Upload to Google Drive
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client
          python3 - <<'EOF'
          import json, base64, os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          creds_b64 = os.environ['GDRIVE_CREDENTIALS']
          creds_json = json.loads(base64.b64decode(creds_b64).decode('utf-8'))
          credentials = service_account.Credentials.from_service_account_info(
              creds_json, scopes=['https://www.googleapis.com/auth/drive'])
          service = build('drive', 'v3', credentials=credentials)
          file_metadata = {
              'name': 'kbbillingapp-build.zip',
              'parents': [os.environ['GDRIVE_FOLDER_ID']]
          }
          media = MediaFileUpload('build.zip', mimetype='application/zip')
          service.files().create(body=file_metadata, media_body=media).execute()
          print("Upload successful!")
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}