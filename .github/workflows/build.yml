name: Build and Save

on:
  push:
    branches: [m-prod]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Create ZIP
        run: zip -r build.zip ./dist

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kb-billing-build
          path: build.zip